# Self-host compose file (DEPLOY-05 invariant — same image runs SaaS and self-host).
# Three services from one image, plus Postgres 16. No cloudflared sidecar in Phase 1
# (deferred to Phase 6 per D-13 / D-19). TRUSTED_PROXY_CIDR is empty by default — the
# self-host bare default per D-20 (use socket peer; no XFF trust).
#
# Use:
#   APP_KEK_BASE64=$(openssl rand -base64 32) \
#   BETTER_AUTH_SECRET=$(openssl rand -hex 32) \
#   GOOGLE_CLIENT_ID=... GOOGLE_CLIENT_SECRET=... \
#   docker compose -f docker-compose.selfhost.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neotolis
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      APP_ROLE: app
      APP_MODE: selfhost
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/neotolis
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_KEK_BASE64: ${APP_KEK_BASE64}
      # D-20: empty default = trust nothing (use socket peer). Override for self-host
      # behind nginx/Caddy: TRUSTED_PROXY_CIDR=127.0.0.1/32
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-}
      PORT: 3000
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "3000:3000"

  worker:
    build: .
    environment:
      APP_ROLE: worker
      APP_MODE: selfhost
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/neotolis
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_KEK_BASE64: ${APP_KEK_BASE64}
      # Worker imports the auth module (shared lib) — env values must be present even
      # though the worker process never serves auth requests. Future-proofs against
      # accidental top-level env reads in shared modules.
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }

  scheduler:
    build: .
    environment:
      APP_ROLE: scheduler
      APP_MODE: selfhost
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/neotolis
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_KEK_BASE64: ${APP_KEK_BASE64}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pg_data: {}
