name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel old runs of the same ref on new pushes; keeps CI minutes honest on rebase-heavy
# branches.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  unit-integration:
    runs-on: ubuntu-latest
    services:
      # D-16: Postgres in CI = service container. Fresh DB per run, no docker-in-docker.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neotolis_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/neotolis_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/neotolis_test
      # Better Auth requires a stable secret >= 32 chars. CI uses a deterministic value
      # (override via repo secret CI_BETTER_AUTH_SECRET if you want a unique one per repo).
      BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET || 'ci-secret-must-be-32-chars-long-or-more' }}
      BETTER_AUTH_URL: http://localhost:3000
      OAUTH_CLIENT_ID: ci-mock-client-id
      OAUTH_CLIENT_SECRET: ci-mock-client-secret
      # Better Auth's genericOAuth plugin fetches OIDC discovery from this URL
      # at boot. Integration tests don't actually drive the OAuth dance (they
      # use seedUserDirectly), but env.ts validates this at module load so a
      # syntactically-valid URL is required.
      OAUTH_DISCOVERY_URL: http://localhost:9090/.well-known/openid-configuration
      # Test KEK is a base64-encoded 32-byte string ("test-kek-" repeated to fill 32 bytes
      # then base64-encoded). Plan 01-04's envelope module verifies this passes the
      # length / base64 / fail-fast guards.
      APP_KEK_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
      - run: pnpm test:integration

  browser-tests:
    # Plan 02-11: UX-02 360px viewport contract (D-42). Boots a vite preview
    # server on the SvelteKit production build, then runs Vitest 4 browser
    # mode (Playwright/Chromium provider) against /, /login at 360x640.
    # Authenticated routes are covered by the manual checkpoint in
    # 02-VALIDATION.md; this job's scope is the public-route smoke.
    #
    # ubuntu-22.04 instead of ubuntu-latest (24.04). 24.04's user-namespace +
    # cgroup setup conflicts with playwright 1.59.1's headless chromium
    # process model — symptom: "Browser connection was closed while running
    # tests" during test execution despite chromium binary present and
    # preview server alive. 22.04 has older kernel/userns layout that
    # playwright handles cleanly.
    runs-on: ubuntu-22.04
    needs: [lint-typecheck]
    env:
      # The SvelteKit build imports server-side modules at analyse time, and
      # src/lib/server/config/env.ts (the SOLE env reader, CLAUDE.md hard
      # rule) validates everything at module init. Provide placeholder values
      # so the build succeeds; the browser tests never hit the server-side
      # env path (they only hit the rendered HTML / hydrated client bundle).
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      BETTER_AUTH_URL: http://localhost:5173
      BETTER_AUTH_SECRET: ci-browser-tests-secret-32-chars-min-length
      OAUTH_CLIENT_ID: browser-test-client-id
      OAUTH_CLIENT_SECRET: browser-test-client-secret
      OAUTH_DISCOVERY_URL: http://localhost:9090/.well-known/openid-configuration
      APP_KEK_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      # NODE_ENV intentionally NOT set at job level — pnpm install with
      # NODE_ENV=production skips devDependencies (tsup, vitest, etc.),
      # breaking `pnpm build`. Set NODE_ENV=production on individual run
      # steps below if a step needs it.
      BROWSER_TEST_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Install only Chromium — Firefox/WebKit are deferred to Phase 6 if
      # cross-engine layout differences surface. `--with-deps` pulls the
      # Linux libs Chromium needs (libnss3, libatk1, etc).
      # `pnpm dlx playwright@<version>` downloads + runs in an ephemeral
      # env, bypassing the broken local binary resolution. Earlier attempts
      # — `pnpm exec playwright`, `pnpm <script> → playwright`, and
      # `node ./node_modules/playwright/cli.js` — all surfaced "Command
      # not found" or "Cannot find module" on the GitHub Actions runner
      # despite playwright being in pnpm-lock.yaml (runs 25172908050,
      # 25173249473, 25173474241). Pin the version to match
      # devDependencies to keep behavior consistent.
      # Install BOTH chromium (full) and chromium-headless-shell — the
      # vitest browser config (vitest.config.ts) sets `headless: true`
      # which makes playwright launch chrome-headless-shell, NOT chromium.
      # Plain `playwright install chromium` does NOT include the headless-
      # shell binary as of v1.49+; it must be installed by name.
      #
      # Version alignment: the `playwright` version in pnpm-lock.yaml
      # resolves to 1.59.1 (transitive from @vitest/browser-playwright),
      # which expects chromium build 1217. Earlier rounds installed
      # binaries from playwright@1.49.0 → version skew → "Executable
      # doesn't exist at .../chromium_headless_shell-1217/...". Install
      # via `pnpm exec playwright` so the version matches the lockfile.
      - run: pnpm exec playwright install chromium chromium-headless-shell --with-deps
      - run: pnpm build
      # Boot vite preview AND run browser tests in the SAME step so the
      # background `pnpm preview` is alive during test execution. GitHub
      # Actions kills background processes when a step ends; splitting boot
      # and test into separate steps causes the preview server to die before
      # the test step starts → vitest browser navigates to :5173 → connection
      # refused → "Browser connection was closed while running tests" (round
      # 7-12 chased this symptom in vitest config before tracing the cause
      # to step boundaries). The trap on EXIT shuts the preview down cleanly.
      - name: Boot vite preview + run browser tests
        run: |
          nohup pnpm preview --port 5173 --host 127.0.0.1 > vite-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill "$PREVIEW_PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:5173/ >/dev/null 2>&1; then
              echo "preview ready"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:5173/ >/dev/null 2>&1; then
            echo "preview did not become ready within 60s"
            cat vite-preview.log
            exit 1
          fi
          pnpm test:browser

  smoke:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-integration]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neotolis
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 10
    env:
      BETTER_AUTH_SECRET: ci-smoke-better-auth-secret-32-chars-min
      BETTER_AUTH_URL: http://localhost:3000
      OAUTH_CLIENT_ID: mock-client-id
      OAUTH_CLIENT_SECRET: mock-client-secret
      # genericOAuth plugin discovery URL; smoke runs the mock on localhost:9090.
      OAUTH_DISCOVERY_URL: http://localhost:9090/.well-known/openid-configuration
      APP_KEK_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/neotolis
      # Smoke runs the production image over plain HTTP; Better Auth would
      # refuse to set __Secure- cookies over HTTP. This override matches what
      # a self-host operator does behind a TLS-terminating reverse proxy that
      # speaks plain HTTP to the app container.
      BETTER_AUTH_SECURE_COOKIES: 'false'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build SvelteKit + node-adapter output BEFORE docker build so the
      # Dockerfile's COPY of /app/build sees real artifacts. Plan 02's
      # original CI workflow assumed `pnpm build` ran inside the Dockerfile
      # build stage (it does — see Dockerfile `RUN pnpm run build`), but
      # the smoke test also invokes `pnpm tsx tests/smoke/lib/oauth-mock-driver.ts`
      # outside Docker, which needs the workspace's compiled SvelteKit
      # artifacts to be coherent (Paraglide compiled messages, server
      # build). Running pnpm build here makes the host workspace match.
      - run: pnpm build
      - run: docker build -t neotolis:ci .

      # D-14: SaaS-leak detection. FAIL the PR if known SaaS-only strings or unguarded
      # Cloudflare-only header references appear in src/. The two patterns below are the
      # initial guardrails; future plans extend the list (e.g. analytics beacons, admin
      # email allowlists). Files under .planning/, docs/, and .git/ are not scanned.
      - name: SaaS-leak grep (D-14)
        run: |
          set -euo pipefail
          # 1) Hard-coded SaaS-only strings must never appear in src/.
          if grep -rn --include='*.ts' --include='*.svelte' \
              -e 'analytics\.neotolis' \
              -e 'admin@neotolis' \
              src/ 2>/dev/null; then
            echo "::error::SaaS-only string found in src/"
            exit 1
          fi
          # 2) CF-Connecting-IP is allowed ONLY inside the trusted-proxy module.
          # Anywhere else risks a self-host operator accidentally trusting a header that
          # nothing has set. The grep is best-effort; the proxy-trust unit tests are
          # the authoritative defense.
          if grep -rn --include='*.ts' \
              -e 'CF-Connecting-IP' \
              src/ 2>/dev/null | grep -v 'proxy-trust'; then
            echo "::error::CF-Connecting-IP referenced outside trusted-proxy module"
            exit 1
          fi

      - name: Run self-host smoke test
        run: bash tests/smoke/self-host.sh
